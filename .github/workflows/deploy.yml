name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ════════════════════════════════════════════════════════════
  # Deploy backend to Railway
  # ════════════════════════════════════════════════════════════
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service backend --detach
        working-directory: apps/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run database migrations
        run: railway run --service backend npx prisma migrate deploy
        working-directory: apps/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ════════════════════════════════════════════════════════════
  # Deploy frontend to Vercel
  # ════════════════════════════════════════════════════════════
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/frontend

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/frontend
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/frontend

  # ════════════════════════════════════════════════════════════
  # Smoke test production after deploy
  # ════════════════════════════════════════════════════════════
  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Check backend health
        run: |
          curl -fsS "${{ secrets.PRODUCTION_API_URL }}/api/health" | grep '"success":true'

      - name: Check backend readiness
        run: |
          curl -fsS "${{ secrets.PRODUCTION_API_URL }}/api/health/ready" | grep '"database":"ok"'

      - name: Check frontend is live
        run: |
          curl -fsS -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_FRONTEND_URL }}" | grep 200
